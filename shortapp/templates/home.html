<!DOCTYPE html>
<html>
<head>
    <title>URL Shortener</title>
</head>
<body>

<h2>Shorten Your URL</h2>

<form method="POST">
    {% csrf_token %}
    <input type="url" name="long_url" placeholder="Enter URL" required>
    <button type="submit">Shorten</button>
</form>

{% if obj %}
    <h3>Short URL:</h3>
    <a href="/{{ obj.short_code }}/" target="_blank">
        {{ request.build_absolute_uri }}{{ obj.short_code }}
    </a>

    <h3>QR Code:</h3>
    <img src="{{ obj.qr_code.url }}" width="200">
{% endif %}

</body>
</html>
