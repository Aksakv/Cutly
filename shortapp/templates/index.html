<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cutly - URL Shortener</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #4facfe, #00f2fe);
            height: 100vh;
        }
        .card {
            border-radius: 15px;
        }
        .title {
            font-weight: bold;
            font-size: 28px;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-lg p-4 text-center">
                <div class="title mb-3">🔗 Cutly URL Shortener</div>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <input type="url" name="long_url" class="form-control" placeholder="Enter your long URL..." required>
                    </div>

                    <button type="submit" class="btn btn-primary w-250">
                        Shorten URL
                    </button>
                </form>
         {% if short_url %}
            <div class="alert alert-success mt-4">
                <strong>Short URL:</strong><br>
                <a href="{{ short_url }}" target="_blank">{{ short_url }}</a>

                <hr>
                <strong>QR Code:</strong><br>

                <img src="/media/qr_codes/{{ obj.short_code }}.png" width="180">

                <p class="text-muted mt-2">Scan to open the link</p>

                <br><br>
                <a href="/media/qr_codes/{{ obj.short_code }}.png" download class="btn btn-success btn-sm">
                    Download QR Code
                </a>
            </div>
        {% endif %}
                    <div class="mt-3">
                    <a href="{% url 'dashboard' %}" class="btn btn-dark">
                        Go to Dashboard
                    </a>
                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>>
