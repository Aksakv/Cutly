<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #f4f6f9;
        }
        .sidebar {
            height: 100vh;
            background: #212529;
            color: white;
            padding: 20px;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            margin: 10px 0;
        }
        .sidebar a:hover {
            color: #0d6efd;
        }
        .card {
            border-radius: 15px;
        }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar">
            <h4>🔗 Shortener</h4>
            <a href="{% url 'home' %}"><i class="bi bi-house"></i> Home</a>
            <a href="{% url 'dashboard' %}"><i class="bi bi-speedometer2"></i> Dashboard</a>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4">

            <h2 class="mb-4">Dashboard</h2>

            <!-- Stats -->
            <div class="row mb-4">
                <div class="col-md-4">
                    <div class="card p-3 shadow">
                        <h5>Total URLs</h5>
                        <h2>{{ total_links }}</h2>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card p-3 shadow">
                        <h5>Total Clicks</h5>
                        <h2>{{ total_clicks }}</h2>
                    </div>
                </div>
            </div>

            <!-- Chart -->
            <div class="card p-4 mb-4 shadow">
                <h5>Clicks Overview</h5>
                <canvas id="clickChart"></canvas>
                <script>
    const labels = {{ labels|safe }};
    const data = {{ data|safe }};

    const ctx = document.getElementById('clickChart');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Clicks',
                data: data,
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    display: true
                }
            }
        }
    });
</script>
            </div>

            <!-- Table -->
            <div class="card p-4 shadow">
                <h5>All URLs</h5>

                <table class="table table-striped mt-3">
                    <thead>
                        <tr>
                            <th>Long URL</th>
                            <th>Short URL</th>
                            <!-- <th>Clicks</th> -->
                        </tr>
                    </thead>

                    <tbody>
                        {% for url in url_list %}
                        <tr>
                            <td style="max-width:300px; overflow:hidden;">
                                {{ url.long_url }}
                            </td>

                            <td>
                                <a href="/{{ url.short_code }}" target="_blank">
                                    {{ url.short_code }}
                                </a>
                            </td>

                            <!-- <td>{{ url.clicks }}</td> -->
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="3" class="text-center">
                                No data available
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>

            </div>

        </div>
    </div>
</div>

<!-- Chart Script -->

<Script>
    const labels =  {{ labels|safe }};
</Script>



</body>
</html>
